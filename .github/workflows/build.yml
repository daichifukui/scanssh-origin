name: Build

on:
  push:
    branches: [master, devel]
  pull_request:
    branches: [master, devel]
  release:
    types: [created]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
    strategy:
      matrix:
        include:
          - container: fedora:latest
            deps: dnf install -y gcc make autoconf automake libpcap-devel libevent-devel libdnet-devel
          - container: rockylinux:9
            deps: dnf install -y 'dnf-command(config-manager)' && dnf config-manager --set-enabled crb && dnf install -y epel-release && dnf install -y gcc make autoconf automake libpcap-devel libevent-devel libdnet-devel
          - container: ubuntu:latest
            deps: apt-get update && apt-get install -y gcc make autoconf automake libpcap-dev libevent-dev libdumbnet-dev
          - container: debian:stable
            deps: apt-get update && apt-get install -y gcc make autoconf automake libpcap-dev libevent-dev libdumbnet-dev
          - container: alpine:latest
            deps: apk add --no-cache gcc g++ make autoconf automake musl-dev libpcap-dev libevent-dev libdnet-dev
          - container: archlinux:latest
            deps: pacman -Syu --noconfirm gcc make autoconf automake libpcap libevent libdnet

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.deps }}

      - name: Autoreconf
        run: autoreconf -f -i

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test binary
        run: ./scanssh -V

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install autoconf automake libpcap libevent libdnet

      - name: Autoreconf
        run: autoreconf -f -i

      - name: Configure
        run: |
          ./configure \
            --with-libpcap=$(brew --prefix libpcap) \
            --with-libevent=$(brew --prefix libevent) \
            --with-libdnet=$(brew --prefix libdnet)

      - name: Build
        run: make

      - name: Test binary
        run: ./scanssh -V

  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y gcc gmake autoconf automake libpcap libevent libdnet
          run: |
            autoreconf -f -i
            ./configure
            make
            ./scanssh -V

  build-openbsd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          prepare: pkg_add gcc-11.2.0p19 gmake autoconf-2.72p0 automake-1.18 libevent libdnet
          run: |
            AUTOCONF_VERSION=2.72 AUTOMAKE_VERSION=1.18 /usr/local/bin/autoreconf-2.72 -f -i
            ./configure
            gmake
            ./scanssh -V

  create-dist:
    runs-on: ubuntu-latest
    container: fedora:latest
    needs: [build-linux, build-macos, build-freebsd, build-openbsd]
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y gcc make autoconf automake libpcap-devel libevent-devel libdnet-devel

      - name: Create distribution
        run: |
          autoreconf -f -i
          ./configure
          make dist

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: scanssh-*.tar.gz
